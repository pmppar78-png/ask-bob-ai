[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[functions."ai-chat"]
  external_node_modules = ["openai"]

[[edge_functions]]
  path = "/*"
  function = "canonical-enforcer"

# ── AI chat function proxy (keep force=true so real files can't shadow it)
[[redirects]]
  from = "/api/ai-chat"
  to = "/.netlify/functions/ai-chat"
  status = 200
  force = true

# ── Remove source/test files from public crawl surface ────────────────
# The site publishes from the repository root so static HTML can stay at
# stable, extensionless URLs. Force source-only files to 404 so crawlers
# and ad review do not see package metadata, local test scripts, or
# function source code as public site content.
[[redirects]]
  from = "/package.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/deno.lock"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/node_modules/*"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/test_browser.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/test_browser_2.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/test_dom.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/test_handler.js"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/test_script.js"
  to = "/404"
  status = 404
  force = true

# ── Domain canonicalization ──────────────────────────────────────────
# The canonical-enforcer edge function handles:
#   • non-canonical hostnames → 301 to askbobai.org
#   • trailing-slash stripping  → 301 /page/ → /page
#   • HTTP Link rel=canonical header on every response
#
# NOTE: the previous explicit ".html → pretty" [[redirects]] rules with
# force=true were REMOVED. They collided with Netlify's built-in
# `pretty_urls = true` processing: pretty_urls internally maps /chat to
# chat.html on disk, but the forced /chat.html redirect hijacked that
# lookup and issued a 301 back to /chat — producing an infinite
# self-redirect loop that blocked Google from indexing every non-root
# page. `pretty_urls = true` natively performs /chat.html → /chat (301)
# and /chat → chat.html (200) without help.
#
# The previous "/:path/ → /:path" trailing-slash rule was also REMOVED;
# the canonical-enforcer edge function already strips trailing slashes
# and pretty_urls redirects /chat/ → /chat on its own.

# ── Headers ──────────────────────────────────────────────────────────
# Security headers for all responses. Indexing directives are applied only
# to indexable HTML by the canonical-enforcer edge function so XML, text,
# API, and error responses are not incorrectly advertised as indexable pages.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Ensure sitemap and robots.txt are cacheable and crawlable
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# Ensure ads.txt is crawlable for AdSense verification
[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# HTML pages — short cache for fresh content, crawlable
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Deploy event — ping search engines after deploy
[build.processing.html]
  pretty_urls = true
